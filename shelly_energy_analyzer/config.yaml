name: Shelly Energy Analyzer
version: "16.41.4-1"
slug: shelly_energy_analyzer
description: Self-hosted Shelly EM/3EM energy monitoring, cost tracking, MQTT/HA discovery, PV/Solar, dynamic spot prices
url: https://github.com/robeertm/shelly-energy-analyzer
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
init: false
boot: auto
startup: services
hassio_role: default
hassio_api: false
homeassistant_api: false
host_network: false
ingress: false
panel_icon: mdi:flash
ports:
  "8765/tcp": 8765
ports_description:
  "8765/tcp": Web UI (HTTP)
map:
  - share:rw
  - addon_config:rw
options:
  log_level: info
  devices:
    - key: shelly1
      name: Haus
      host: 192.168.1.100
      em_id: 0
  mqtt:
    enabled: false
    broker: core-mosquitto
    port: 1883
    username: ""
    password: ""
    topic_prefix: shelly_analyzer
    ha_discovery: true
    ha_discovery_prefix: homeassistant
    publish_interval_seconds: 10
  ui:
    language: de
    live_poll_seconds: 1
    live_window_minutes: 10
    live_retention_minutes: 120
  electricity_price_eur_per_kwh: 0.30
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  devices:
    - key: str
      name: str
      host: str
      em_id: int(0,2)
  mqtt:
    enabled: bool
    broker: str
    port: port
    username: str?
    password: password?
    topic_prefix: str
    ha_discovery: bool
    ha_discovery_prefix: str
    publish_interval_seconds: float(1,3600)
  ui:
    language: list(de|en)
    live_poll_seconds: float(0.5,60)
    live_window_minutes: int(1,1440)
    live_retention_minutes: int(1,10080)
  electricity_price_eur_per_kwh: float(0,10)
