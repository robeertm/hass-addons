name: Thread Mesh Diagnostics
version: "1.0.0"
slug: thread_mesh_diag
description: Polls matter.js Server (ThreadNetworkDiagnostics cluster 0x35) for per-Eve RSSI and publishes sensors to HA via Supervisor proxy. Mike-Variante von Roberts dump_mesh.py (HAOS-kompatibel, kein docker exec nötig).
url: https://github.com/robeertm/hass-addons
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
init: false
boot: auto
startup: services
hassio_role: default
hassio_api: true
homeassistant_api: true
host_network: false
panel_icon: mdi:hexagon-multiple
options:
  log_level: info
  matterjs:
    host: a35e7931-matterjs
    port: 5580
  poll:
    interval_seconds: 300
  sensor_prefix: thread_rssi
  name_overrides:
    "10": "eve_energy_wohnzimmer"
    "11": "eve_thermo_schlafzimmer"
    "14": "eve_door_schlafzimmer_rechts"
    "15": "eve_door_schlafzimmer_links"
schema:
  log_level: list(debug|info|notice|warning|error|fatal)
  matterjs:
    host: str
    port: port
  poll:
    interval_seconds: int(60,3600)
  sensor_prefix: str
  name_overrides:
    "*": str
