name: UDM Health Monitor
version: "1.0.0"
slug: udm_health_monitor
description: Poll UniFi UDM Pro (SE) hardware sensors (CPU/Mem/Temp/Load/Uptime/PoE) via local API, publish to MQTT for Home Assistant Auto-Discovery.
url: https://github.com/robeertm/hass-addons
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
init: false
boot: auto
startup: services
hassio_role: default
hassio_api: false
homeassistant_api: false
host_network: false
panel_icon: mdi:router-network
options:
  log_level: info
  udm:
    host: 192.168.1.1
    username: ""
    password: ""
    verify_ssl: false
  device:
    name: "UDM Pro SE"
    id_suffix: "home"
  poll:
    interval_seconds: 30
  mqtt:
    broker: core-mosquitto
    port: 1883
    username: ""
    password: ""
    discovery_prefix: homeassistant
    state_topic_prefix: udm_health
  alerts:
    cpu_temp_warn_c: 70
    cpu_temp_alert_c: 80
    mem_pct_warn: 85
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  udm:
    host: str
    username: str
    password: password
    verify_ssl: bool
  device:
    name: str
    id_suffix: match(^[a-z0-9_]+$)
  poll:
    interval_seconds: int(10,600)
  mqtt:
    broker: str
    port: port
    username: str?
    password: password?
    discovery_prefix: str
    state_topic_prefix: str
  alerts:
    cpu_temp_warn_c: float(40,100)
    cpu_temp_alert_c: float(40,100)
    mem_pct_warn: float(0,100)
