name: HAUS Cockpit (Klipphausen)
version: "1.4.1"
slug: haus_cockpit
description: Read-only Ops-Cockpit für Klipphausen — Huawei-Solar, Internet & Sicherheit, ALLE Sensoren (Explorer), Klima, Pi/UDM/BLE. Nur Mikes Haus, schaltet nichts.
url: https://github.com/robeertm/hass-addons/tree/main/haus_cockpit
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
init: false
boot: auto
startup: services
hassio_role: default
hassio_api: false
homeassistant_api: false
host_network: true
ingress: false
panel_icon: mdi:view-dashboard-variant
webui: http://[HOST]:[PORT:8099]
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": Web UI (HTTP) — im Browser aufrufen
map:
  - share:rw
options:
  ha_base_url: "http://127.0.0.1:8123"
  ha_token: ""
  mqtt_host: "127.0.0.1"
  mqtt_port: 1883
  mqtt_user: "ha"
  mqtt_pass: ""
  flowcol_url: "http://127.0.0.1:3002"
  refresh_seconds: 4
  snmp_user: "robeertm"
  snmp_auth_pass: ""
  snmp_priv_pass: ""
  snmp_host: "10.10.2.1"
schema:
  ha_base_url: str
  ha_token: str?
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_user: str?
  mqtt_pass: str?
  flowcol_url: str?
  refresh_seconds: int(2,60)
  snmp_user: str?
  snmp_auth_pass: password?
  snmp_priv_pass: password?
  snmp_host: str?
