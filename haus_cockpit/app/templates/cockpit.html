<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HAUS · Ops Cockpit</title>
  <link rel="preconnect" href="/">
  <link rel="stylesheet" href="/static/css/cockpit.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%23cba6f7'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%2311111b'/%3E%3C/svg%3E">
</head>
<body>
  <div class="wrap">

    <!-- ── top bar ── -->
    <header class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>HAUS · COCKPIT</h1>
          <div class="sub">Ops Control</div>
        </div>
      </div>

      <div id="overall" class="overall ov-nominal">
        <span class="beacon"></span>
        <span class="otext" id="overall-text">INITIALISIERE…</span>
        <span class="ocounts" id="overall-counts"></span>
      </div>

      <div class="clock">
        <div class="time" id="clock-time">--:--:--</div>
        <div class="date" id="clock-date">—</div>
        <div class="mqtt-pill off" id="mqtt-pill">
          <span class="dot"></span><span id="mqtt-text">MQTT —</span>
        </div>
      </div>
    </header>

    <!-- ── house tabs ── -->
    <div class="tabs" id="tabs"></div>

    <!-- ── views ── -->
    <main id="views"></main>

    <footer class="foot">
      haus-cockpit · <span class="live">● LIVE</span> ·
      poll <span id="foot-refresh">–</span>s ·
      gerendert <span id="foot-gen">–</span> ·
      read-only observer der MQTT-Health-Feeds
    </footer>
  </div>

  <div class="toasts" id="toasts"></div>

  <script>window.REFRESH_SEC = {{ refresh_sec }};</script>
  <script src="/static/js/cockpit.js"></script>
</body>
</html>
